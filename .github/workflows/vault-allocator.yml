name: VAULT Brian — Income Allocator

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: income (default) or rebalance'
        required: false
        default: 'income'

jobs:
  allocate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run allocator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: python -m agents.allocator ${{ github.event.inputs.mode }}

      - name: Alert on failure
        if: failure()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          python -c "
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText('Brian Allocator agent failed. Check GitHub Actions:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          msg['Subject'] = 'BRIAN ALERT: Allocator Failed'
          msg['From'] = os.environ['GMAIL_ADDRESS']
          msg['To'] = os.environ['ALERT_EMAIL']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_ADDRESS'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
